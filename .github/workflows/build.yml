---
on:
  pull_request: &ignore-paths
    paths-ignore:
      - ".gitattributes"
      - ".gitignore"
      - "CHANGELOG.md"
      - "docs/**"
      - "README.md"

  push: *ignore-paths

name: build

permissions:
  contents: read

jobs:
  phpunit:
    uses: yii2-framework/actions/.github/workflows/phpunit.yml@e02758a41a2a811fb3e706735192979171b2260d # v2.0.1
    with:
      concurrency-group: phpunit-${{ github.workflow }}-${{ github.ref }}
      extensions: sockets
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
